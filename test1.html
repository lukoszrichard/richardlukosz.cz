<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1a1a1a; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            text-align: center; 
            position: relative;
            padding: 40px 20px; 
            box-sizing: border-box;

            /* DOČASNÉ ŘÁDKY PRO VIZUALIZACI: */
            outline: 5px solid red; 
            box-shadow: inset 0 0 0 20px rgba(255, 0, 0, 0.3); 
            /* KONEC DOČASNÝCH ŘÁDKŮ */
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { color: #888; font-size: 1.2rem; }

        .lang-switcher {
            position: fixed; 
            top: 20px;
            right: 20px;
            z-index: 100; 
        }
        .lang-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .lang-btn:hover {
            background: #444;
        }

        .lang-en { display: none; }

        .hamburger-btn {
            position: fixed; 
            top: 15px;
            left: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 100; 
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: -100%; 
            width: 250px;
            height: 100vh;
            background: #111;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            padding: 80px 20px;
            box-sizing: border-box;
            transition: 0.3s ease; 
            z-index: 99;
        }

        .mobile-menu.open {
            left: 0; 
        }

        .menu-link {
            color: #888;
            font-size: 1.2rem;
            text-decoration: none;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .menu-link:hover, .menu-link.active {
            color: #fff;
        }
    </style>
</head>
<body> <button class="hamburger-btn" onclick="toggleMenu()">☰</button>

<nav class="mobile-menu" id="mobileMenu">
    <a href="index.html" class="menu-link">Domů / Home</a>
    <a href="galerie.html" class="menu-link active">TEST</a>
</nav>

    <div class="lang-switcher">
        <button class="lang-btn" id="langToggle" onclick="toggleLanguage()">EN</button>
    </div>

    <h1>
        <span class="lang-cs">Testování...</span>
        <span class="lang-en">Testing...</span>
    </h1>
    
    <p>1 / 1 = 1</p>

    <p>1 / 1 = 1</p>
    <p>1 / 1 = 1</p>

    <p>1 / 1 = 1</p>

    <p>1 / 1 = 1</p>
    <p>1 / 1 = 1</p>
    <p>1 / 1 = 1</p>

    <p>1 / 1 = 1</p>

    <p>1 / 1 = 1</p>
    <p>1 / 1 = 1</p>

    <p style="display: flex; justify-content: center; gap: 50px; margin: 10px 0;">
    <span>1 / 1 = 1</span>
    <span>1 / 1 = 1</span>
    <span>1 / 1 = 1</span>
    </p>

    <p>1 / 1 = 1</p>
    <p>1 / 1 = 1</p>

    <p>1 / 1 = 1</p>

    <script>
        let currentLang = 'cs';

        function toggleLanguage() {
            const csElements = document.querySelectorAll('.lang-cs');
            const enElements = document.querySelectorAll('.lang-en');
            const btn = document.getElementById('langToggle');

            if (currentLang === 'cs') {
                csElements.forEach(el => el.style.display = 'none');
                enElements.forEach(el => el.style.display = 'inline-block');
                btn.innerText = 'CZ';
                currentLang = 'en';
            } else {
                csElements.forEach(el => el.style.display = 'inline-block');
                enElements.forEach(el => el.style.display = 'none');
                btn.innerText = 'EN';
                currentLang = 'cs';
            }
        }

        function toggleMenu() {
        const menu = document.getElementById('mobileMenu');
        menu.classList.toggle('open');
        }
    </script>
</body>
</html>
