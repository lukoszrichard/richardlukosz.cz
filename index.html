<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art.</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1a1a1a; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            text-align: center; 
            position: relative;
            padding: 40px 20px; 
            box-sizing: border-box;
        }

        body:not(.lang-en-active) .lang-en { display: none; }
        body.lang-en-active .lang-cs { display: none; }

        h1 { 
            font-size: 3rem; 
            margin-bottom: 10px; 
        }
        
        .art-title {
            font-size: 1.8rem; 
            margin-top: 40px; 
            margin-bottom: 15px; 
            color: #fff;
        }

        .art-subtitle {
            font-size: 1.2rem; 
            color: #aaa; 
            font-weight: normal;
        }

        .art-figure {
            margin: 0;
            padding: 0;
        }

        .foto-obrazu {
            max-width: 100%; 
            width: 450px; 
            height: auto; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
        }

        .art-author {
            color: #666; 
            font-size: 0.85rem; 
            margin-top: 10px; 
            font-style: normal;
        }

        .art-meta {
            color: #555; 
            font-size: 0.8rem; 
            margin-top: 5px; 
            font-style: italic;
        }

        .wiki-link {
            color: #8ab4f8;
            text-decoration: none;
            margin-left: 4px;
            font-weight: bold;
        }
        .wiki-link:hover {
            text-decoration: underline;
        }

        .lang-switcher {
            position: fixed; 
            top: 20px;
            right: 20px;
            z-index: 100; 
        }
        
        .lang-btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        
        .lang-btn:hover {
            background: #444;
        }

        .hamburger-btn {
            position: fixed; 
            top: 15px;
            left: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 100; 
        }

        .mobile-menu {
            position: fixed;
            top: 0;
            left: -100%; 
            width: 250px;
            height: 100vh;
            background: #111;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            padding: 80px 20px;
            box-sizing: border-box;
            transition: 0.3s ease; 
            z-index: 99;
        }

        .mobile-menu.open {
            left: 0; 
        }

        .menu-link {
            color: #888;
            font-size: 1.2rem;
            text-decoration: none;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        
        .menu-link:hover, .menu-link.active {
            color: #fff;
        }
    </style>
</head>
<body> 
    <button class="hamburger-btn" aria-label="Menu" onclick="toggleMenu()">☰</button>
    <nav class="mobile-menu" id="mobileMenu">
        <a href="index.html" class="menu-link active">Domů / Home</a>
        <a href="games.html" class="menu-link">Hry / Games</a>
        <a href="os.html" class="menu-link">Operační systémy / OS</a>
        <a href="test1.html" class="menu-link">TEST</a>
    </nav>

    <div class="lang-switcher">
        <button class="lang-btn" id="langToggle" onclick="toggleLanguage()">EN</button>
    </div>

    <h1>
        <span class="lang-cs">Pilotní projekt</span>
        <span class="lang-en">Pilot project</span>
    </h1>

    <h2 class="art-title">
        <span class="lang-cs">
            The Threatened Swan<br>
            <span class="art-subtitle">(Ohrožená labuť)</span>
        </span>
        
        <span class="lang-en">The Threatened Swan</span>
    </h2>

    <figure class="art-figure">
        <img src="art1.JPG" alt="Obraz The Threatened Swan od Jana Asselijna vystavený v Rijksmuseum" class="foto-obrazu">
        
        <figcaption>
            <div class="art-author">
                <span class="lang-cs">
                    Autor: Jan Asselijn, rok ~1650 
                    <a href="https://en.wikipedia.org/wiki/The_Threatened_Swan" target="_blank" rel="noopener noreferrer" class="wiki-link">[Wikipedie]</a>
                </span>
                <span class="lang-en">
                    Author: Jan Asselijn, year ~1650 
                    <a href="https://en.wikipedia.org/wiki/The_Threatened_Swan" target="_blank" rel="noopener noreferrer" class="wiki-link">[Wikipedia]</a>
                </span>
            </div>
            
            <div class="art-meta">
                <span class="lang-cs">Foto pořízené v muzeu Rijksmuseum (Amsterdam, Nizozemí); duben 2026.</span>
                <span class="lang-en">Photo taken in the Rijksmuseum museum (Amsterdam, The Netherlands); April 2026.</span>
            </div>
        </figcaption>
    </figure>

    <script>
        function toggleLanguage() {
            const body = document.body;
            const btn = document.getElementById('langToggle');

            body.classList.toggle('lang-en-active');

            if (body.classList.contains('lang-en-active')) {
                btn.innerText = 'CZ';
            } else {
                btn.innerText = 'EN';
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('open');
        }

        document.addEventListener('click', function(udalost) {
            const menu = document.getElementById('mobileMenu');
            const burgerTlacitko = document.querySelector('.hamburger-btn');

            if (menu.classList.contains('open')) {
                if (!menu.contains(udalost.target) && !burgerTlacitko.contains(udalost.target)) {
                    menu.classList.remove('open'); 
                }
            }
        });
    </script>
</body>
</html>
